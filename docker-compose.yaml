version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: microservice_db
    networks:
      - microservice
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  registry-service:
    build: ./DiscoveryServer
    container_name: registryServer_container
    ports:
      - "8761:8761"
    networks:
      - microservice
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  auth-service:
    build: ./auth
    container_name: auth_container
    depends_on:
      mysql:
        condition: service_healthy
      registry-service:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://registry-service:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: true
      EUREKA_CLIENT_FETCH_REGISTRY: true
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true

  booking-service:
    build: ./booking
    container_name: booking_container
    depends_on:
      mysql:
        condition: service_healthy
      registry-service:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://registry-service:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: true
      EUREKA_CLIENT_FETCH_REGISTRY: true
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true

  hotel-service:
    build: ./hotelservice
    container_name: hotel_container
    depends_on:
      mysql:
        condition: service_healthy
      registry-service:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://registry-service:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: true
      EUREKA_CLIENT_FETCH_REGISTRY: true
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true

  gateway-service:
    build: ./gateway
    container_name: gateway_container
    depends_on:
      registry-service:
        condition: service_healthy
    ports:
      - "9090:9090"
    networks:
      - microservice
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://registry-service:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: true
      EUREKA_CLIENT_FETCH_REGISTRY: true
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true

volumes:
  mysql_data:

networks:
  microservice: